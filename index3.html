  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: var(--font-size-display-m); font-weight: var(--font-weight-display-m); line-height: var(--line-height-display-m); color: var(--text-primary); letter-spacing: var(--tracking-tight); margin: 0; text-wrap: balance;\">Every solution paves the way for solving what comes next.<\u002Fh2>\n          <p style=\"font: 400 1.375rem/1.55 var(--font-body); color: #C7C3BA; margin: 0; text-wrap: pretty;\">We build self-improving world models. The LLM already holds a vast ontology of the world and externalizes it by writing programs, because a program is a model. It writes an executable model of a domain, proposes minimal experiments to resolve what's uncertain, and tests its predictions against reality.<\u002Fp>\n          \n        <\u002Fdiv>\n        <div data-om-raster=\"\" class=\"sf-loop\" style=\"position: relative; width: 100%; max-width: 420px; aspect-ratio: 1/1; margin: 0 auto; justify-self: center;\">\n          <div style=\"position: absolute; inset: 0; border-radius: 50%; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 0; border-radius: 50%; border: 1px dashed var(--border-default);\" data-loop-ring=\"1\"><\u002Fdiv>\n          <div style=\"position: absolute; inset: 32px; border-radius: 50%; border: 1px solid var(--border-subtle);\" data-loop-ring=\"-0.6\"><\u002Fdiv>\n          <svg data-loop-ring=\"0.45\" sc-camel-view-box=\"0 0 400 400\" style=\"position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible;\">\n            <defs>\n              <marker id=\"loopArrow\" sc-camel-marker-width=\"9\" sc-camel-marker-height=\"9\" sc-camel-ref-x=\"4\" sc-camel-ref-y=\"3\" orient=\"auto\"><path d=\"M0,0 L6,3 L0,6 Z\" fill=\"var(--sf-ember-500)\"><\u002Fpath><\u002Fmarker>\n            <\u002Fdefs>\n            <g fill=\"none\" stroke=\"var(--sf-ember-500)\" stroke-width=\"2\" marker-end=\"url(#loopArrow)\">\n              <path d=\"M288.17,78.65 A150,150 0 0 1 349.18,184.32\">  Asgharbeygi<\u002Fspan>\n            <span style=\"font: var(--text-mono-s); color: var(--text-accent); letter-spacing: var(--tracking-wide);\">CTO<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font: var(--text-body-m); color: #C7C3BA; margin: 0; text-wrap: pretty;\">Previous Area Tech Lead for on-device AI at Google Maps. Co-founder &amp; CTO of CleverSense (acquired by Google in 2011).<\u002Fp>\n          <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px; align-items: center; justify-items: center; margin-top: 10px;\">\n            <img src=\"72ec6586-cd19-4c19-909f-b970b2c32029\" alt=\"Google Maps\" style=\"height: 24px; width: auto;\">\n            <img src=\"80b5f963-bf88-4258-a622-68f2b432684e\" alt=\"Google Analytics\" style=\"height: 24px; width: auto;\">\n            <img src=\"5d3cabdf-b32c-4922-ab07-687ab519e0bb\" alt=\"CleverSense\" style=\"height: 28px; width: auto;\">\n            <img src=\"859bfc34-b042-4aa0-ad5a-82f4f27340ab\" alt=\"Stanford University\" style=\"height: 26px; width: auto;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" class=\"sf-contact\" style=\"padding: 180px var(--page-margin) 20px; border-top: 1px solid var(--border-subtle); text-align: center;\">\n    <div style=\"max-width: var(--content-max); margin: 0 auto; display: flex; flex-direction: column; align-items: center;\">\n      <div style=\"font: var(--text-label); color: var(--text-olive); letter-spacing: var(--tracking-wider); text-transform: uppercase; margin-bottom: 18px;\">Contact<\u002Fdiv>\n      <h2 style=\"font-family: var(--font-display); font-size: var(--font-size-display-m); font-weight: var(--font-weight-display-m); line-height: var(--line-height-display-m); color: var(--text-primary); letter-spacing: var(--tracking-tight); margin: 0 0 28px; text-wrap: balance;\">Work with the foundry.<\u002Fh2>\n      <a href=\"mailto:jad@superfoundry.dev\" style=\"font: var(--text-body-l); color: var(--text-accent);\">jad@superfoundry.dev<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin: 120px 0 0; display: flex; justify-content: flex-end;\"><span style=\"font: var(--text-mono-s); color: var(--text-tertiary); letter-spacing: var(--tracking-wide);\">© 2026<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;backdrop&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Galaxy&quot;,&quot;options&quot;:[&quot;Galaxy&quot;,&quot;Charcoal&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Page&quot;}}\">\nclass Component extends DCLogic {\n  state = { sent: false };\n  componentDidMount() {\n    // iOS/Safari can't composite WebM alpha — swap to the navy-baked WebM there\n    // (the hero logo sits on solid #000410, so it looks identical).\n    const ua = navigator.userAgent;\n    const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);\n    const isSafari = /Safari/.test(ua) && !/Chrome|CriOS|Android/.test(ua);\n    // iOS/Safari can't composite WebM alpha — point the same element at the\n    // navy-baked WebM and let the shared `start()` logic below handle playback\n    // (this is the code path that worked before).\n    if (isIOS || isSafari) {\n      document.querySelectorAll('video[src$=\"sf-logo.webm\"]').forEach((v) => {\n        v.addEventListener('error', () => {\n          const img = document.createElement('img');\n          img.src = 'assets/logo/sf-logo.png';\n          img.alt = 'Superintelligence Foundry';\n          img.style.cssText = v.style.cssText;\n          v.replaceWith(img);\n        }, { once: true });\n        v.src = (window.__resources || {}).logoNavy || 'assets/logo/sf-logo-navy.webm';\n      });\n    }\n    const start = () => {\n      document.querySelectorAll('video').forEach((v) => {\n        v.loop = true; v.muted = true; v.playsInline = true;\n        // React sets these as properties only; iOS needs the real attributes\n        // present to allow inline muted autoplay without a play button.\n        v.setAttribute('muted', ''); v.setAttribute('playsinline', ''); v.setAttribute('autoplay', '');\n        const go = () => v.play().catch(() => {});\n        if (v.readyState >= 2) go(); else v.addEventListener('loadeddata', go, { once: true });\n        v.addEventListener('ended', () => { v.currentTime = 0; go(); });\n      });\n    };\n    start();\n    setTimeout(start, 300);\n    // iOS can reject the first play() calls while the page is still settling —\n    // retry on a short schedule after load, then keep the gesture fallbacks.\n    const kick = () => document.querySelectorAll('video').forEach((v) => { if (v.paused) v.play().catch(() => {}); });\n    [300, 800, 1500, 3000].forEach((ms) => setTimeout(kick, ms));\n    // If the OS denies autoplay outright (Low Power Mode / Auto-Play off),\n    // hide the paused-video play button behind the static mark; first touch\n    // restores and plays the animation.\n    setTimeout(() => {\n      document.querySelectorAll('video').forEach((v) => {\n        if (!v.paused || v.dataset.pngShim) return;\n        v.play().catch(() => {\n          if (v.dataset.pngShim) return;\n          v.dataset.pngShim = '1';\n          const img = document.createElement('img');\n          img.src = 'assets/logo/sf-logo.png';\n          img.alt = 'Superintelligence Foundry';\n          img.style.cssText = v.style.cssText;\n          v.style.display = 'none';\n          v.parentNode.insertBefore(img, v);\n          const restore = () => {\n            v.play().then(() => { img.remove(); v.style.display = ''; }).catch(() => {});\n          };\n          document.addEventListener('touchstart', restore, { once: true, passive: true });\n        });\n      });\n    }, 1200);\n    window.addEventListener('load', kick);\n    window.addEventListener('pageshow', kick);\n    document.addEventListener('visibilitychange', () => { if (!document.hidden) kick(); });\n    document.addEventListener('touchstart', kick, { once: true, passive: true });\n\n    const spin = () => {\n      const anchor = document.querySelector('[data-om-raster]');\n      if (!anchor) return;\n      const rect = anchor.getBoundingClientRect();\n      const traveled = (window.innerHeight || 800) - rect.top; // grows as user scrolls the loop into/through view\n      const base = traveled * 0.18;\n      document.querySelectorAll('[data-loop-ring]').forEach((el) => {\n        const f = parseFloat(el.getAttribute('data-loop-ring')) || 0;\n        el.style.transform = `rotate(${base * f}deg)`;\n      });\n      const label = document.getElementById('sf-wm-label');\n      if (label) {\n        // eased growth: 85% by viewport center, remaining 15% as it exits the top\n        const vh = window.innerHeight || 800;\n        const centerDist = rect.top + rect.height / 2; // px from viewport top to loop center\n        const p1 = Math.min(1, Math.max(0, (vh - centerDist) / (vh / 2)));       // bottom → center\n        const p2 = Math.min(1, Math.max(0, (vh / 2 - centerDist) / (vh / 2)));   // center → top\n        const easeOut = (x) => 1 - Math.pow(1 - x, 3);\n        const t = 0.85 * easeOut(p1) + 0.15 * easeOut(p2);\n        const c = Math.round(138 + (255 - 138) * t);\n        label.style.color = `rgb(${c},${Math.round(135 + (255 - 135) * t)},${Math.round(127 + (255 - 127) * t)})`;\n        label.style.transform = `scale(${0.85 + 0.45 * t})`;\n        const ri = document.getElementById('sf-wm-ring-inner');\n        if (ri) ri.style.scale = 0.7 + 0.8 * t;\n        const bd = document.getElementById('sf-wm-border');\n        // color ramp starts halfway through the growth and eases in\n        const ct = Math.pow(Math.min(1, Math.max(0, (t - 0.4) / 0.6)), 1.6);\n        const lerp = (a, b) => Math.round(a + (b - a) * ct);\n        if (bd) {\n          bd.setAttribute('stroke-width', (0.75 + 1.25 * t).toFixed(2));\n          // grey #8a877f -> ember #E8703A\n          bd.setAttribute('stroke', `rgba(${lerp(138,232)},${lerp(135,112)},${lerp(127,58)},${(0.5 + 0.5 * ct).toFixed(2)})`);\n        }\n        // graticule (lat arcs + meridians) grey -> azure #6E9FE8\n        const gratStroke = `rgba(${lerp(245,110)},${lerp(243,159)},${lerp(238,232)},${(0.2 + 0.35 * ct).toFixed(2)})`;\n        document.querySelectorAll('.sf-wm-grat').forEach((el) => el.setAttribute('stroke', gratStroke));\n        document.querySelectorAll('.sf-wm-meridian').forEach((el) => el.setAttribute('stroke', gratStroke));\n        // countries grey -> olive #7A9448\n        const cStroke = `rgba(${lerp(245,122)},${lerp(243,148)},${lerp(238,72)},${(0.3 + 0.5 * ct).toFixed(2)})`;\n        document.querySelectorAll('.sf-wm-country').forEach((el) => el.setAttribute('stroke', cStroke));\n        const phase = Math.abs(base) * 1.6; // degrees of globe rotation\n        document.querySelectorAll('.sf-wm-meridian').forEach((g) => {\n          const lon = parseFloat(g.getAttribute('data-lon')) || 0;\n          const a = ((lon + phase) % 180 + 180) % 180; // 0..180\n          const rad = a * Math.PI / 180;\n          const el = g.querySelector('ellipse');\n          if (el) el.setAttribute('rx', Math.max(0.5, Math.abs(56 * Math.cos(rad))).toFixed(2));\n          g.setAttribute('opacity', (0.5 + 0.5 * Math.abs(Math.sin(rad))).toFixed(2));\n        });\n        document.querySelectorAll('.sf-wm-country').forEach((g) => {\n          const lon = parseFloat(g.getAttribute('data-lon')) || 0;\n          const a = (lon + phase) * Math.PI / 180;\n          const x = Math.sin(a);   // -1..1 across the disc\n          const depth = Math.cos(a); // >0 front, <0 back\n          if (depth <= 0.05) { g.setAttribute('opacity', '0'); return; }\n          g.setAttribute('opacity', (0.35 + 0.65 * depth).toFixed(2));\n          g.style.transform = `translate(${(x * 42).toFixed(1)}px, 0) scaleX(${Math.max(0.12, depth).toFixed(2)})`;\n        });\n      }\n      document.querySelectorAll('[data-loop-counter]').forEach((el) => {\n        const f = parseFloat(el.getAttribute('data-loop-counter')) || 0;\n        el.style.transform = `rotate(${-base * f}deg)`;\n      });\n    };\n    this._onScroll = () => {\n      if (this._raf) return;\n      this._raf = requestAnimationFrame(() => { this._raf = null; spin(); });\n    };\n    window.addEventListener('scroll', this._onScroll, true);\n    window.addEventListener('resize', this._onScroll);\n    spin();\n  }\n  componentWillUnmount() {\n    if (this._onScroll) {\n      window.removeEventListener('scroll', this._onScroll, true);\n      window.removeEventListener('resize', this._onScroll);\n    }\n  }\n  renderVals() {\n    const scrollTo = (id) => {\n      const el = document.getElementById(id);\n      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 70, behavior: 'smooth' });\n    };\n    return {\n      isMobile: window.matchMedia && window.matchMedia('(max-width: 760px), (pointer: coarse)').matches,\n      lowerBg: (this.props.backdrop ?? 'Galaxy') !== 'Galaxy' ? 'transparent'\n        : (window.matchMedia && window.matchMedia('(max-width: 760px), (pointer: coarse)').matches\n          ? 'transparent'\n          : \"linear-gradient(rgba(5,5,5,0.7), rgba(5,5,5,0.7)) fixed, #050505 url('\" + ((window.__resources || {}).galaxyBg || 'uploads/galaxy-bg.jpg') + \"') center / cover no-repeat fixed\"),\n      galaxyOn: (this.props.backdrop ?? 'Galaxy') === 'Galaxy',\n      sent: this.state.sent,\n      notSent: !this.state.sent,\n      goContact: () => scrollTo('contact'),\n      goMission: () => scrollTo('mission'),\n      onSubmit: (e) => { e.preventDefault(); this.setState({ sent: true }); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
